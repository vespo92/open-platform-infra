# LiteLLM — Unified AI Gateway
#
# Provides a single OpenAI-compatible endpoint for all LLM consumers.
# Routes requests to the best available backend based on model, cost, and availability.
#
# All apps (OP, vClusters, scripts) hit: http://litellm.litellm.svc:4000/v1/
# No per-app API key management — LiteLLM handles provider keys centrally.
#
# Usage from any pod in the cluster:
#   curl http://litellm.litellm.svc:4000/v1/chat/completions \
#     -H "Authorization: Bearer sk-litellm-master-key" \
#     -d '{"model": "claude-sonnet", "messages": [{"role": "user", "content": "hello"}]}'
apiVersion: v1
kind: Namespace
metadata:
  name: litellm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # Docs: https://docs.litellm.ai/docs/proxy/configs

    model_list:
      # Claude models via Anthropic API
      - model_name: claude-opus
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: claude-sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: claude-haiku
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_key: os.environ/ANTHROPIC_API_KEY

      # Local Ollama models (free, GPU-accelerated)
      - model_name: local-llama
        litellm_params:
          model: ollama/llama3.1
          api_base: http://ollama.ollama.svc:11434
      - model_name: local-embed
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://ollama.ollama.svc:11434

    # Fallback: if primary fails, try next
    # router_settings:
    #   routing_strategy: "latency-based-routing"
    #   allowed_fails: 2
    #   num_retries: 3

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: litellm
type: Opaque
stringData:
  # Customize: add your API keys here (or use external secret management)
  ANTHROPIC_API_KEY: "sk-ant-your-key-here"
  LITELLM_MASTER_KEY: "sk-litellm-change-me"
  # DATABASE_URL for spend tracking (optional, uses SQLite by default)
  # DATABASE_URL: "postgresql://litellm:password@postgres.cnpg-system.svc:5432/litellm"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          ports:
            - containerPort: 4000
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
          envFrom:
            - secretRef:
                name: litellm-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: litellm
spec:
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
