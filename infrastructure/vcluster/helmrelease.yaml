# vCluster operator — enables creating virtual Kubernetes clusters
# for tenant isolation. Open Platform deploys into a vCluster when
# using infrastructure.mode=external.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vcluster
  namespace: vcluster
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: vcluster
      sourceRef:
        kind: HelmRepository
        name: loft
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: loft
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.loft.sh
