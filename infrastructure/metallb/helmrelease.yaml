apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metallb
  namespace: flux-system
spec:
  interval: 24h
  url: https://metallb.github.io/metallb
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: metallb
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # ────────────────────────────────────────────────────────────────────
  # FRR mode is enabled so the speaker can do BGP as well as L2.
  # If you only need L2 advertisement (single flat network, no router
  # peering), this still works — L2Advertisement resources are honored
  # in FRR mode just like the legacy speaker.
  #
  # Why FRR over the legacy speaker:
  #   - Single binary speaks both BGP and L2 (no mode switch required)
  #   - Real BGP implementation (FRR / Quagga lineage)
  #   - Required for unnumbered BGP, communities, and any router peering
  # ────────────────────────────────────────────────────────────────────
  values:
    speaker:
      frr:
        enabled: true
