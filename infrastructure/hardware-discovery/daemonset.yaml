# Hardware Discovery DaemonSet
#
# Runs on every node, reads /etc/hardware-facts.json (generated by NixOS
# hardware-classification module), and applies Kubernetes node labels.
#
# Labels applied (platform.openplatform.io/ prefix):
#   memory.ecc=true|false          — ECC RAM detected
#   storage.class=nvme|hdd         — Primary storage type
#   storage.nvme=true|false        — Has any NVMe drives
#   gpu.nvidia=true|false          — NVIDIA GPU present
#   gpu.amd=true|false             — AMD GPU present
#   cpu.cores=<N>                  — CPU core count
#   ram.gib=<N>                    — Total RAM in GiB
#
# Taints applied (only when hardware-discovery runs, not at registration):
#   gpu=true:NoSchedule            — GPU nodes only run GPU-tolerant workloads
#   memory.ecc=true:PreferNoSchedule — Prefer ECC nodes for data workloads
#
# The DaemonSet re-checks every 6 hours to catch hardware changes (hot-add, etc).
apiVersion: v1
kind: Namespace
metadata:
  name: hardware-discovery
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hardware-discovery
  namespace: hardware-discovery
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hardware-discovery
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hardware-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hardware-discovery
subjects:
  - kind: ServiceAccount
    name: hardware-discovery
    namespace: hardware-discovery
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hardware-discovery
  namespace: hardware-discovery
  labels:
    app: hardware-discovery
spec:
  selector:
    matchLabels:
      app: hardware-discovery
  template:
    metadata:
      labels:
        app: hardware-discovery
    spec:
      serviceAccountName: hardware-discovery
      hostPID: false
      hostNetwork: false
      tolerations:
        # Run on ALL nodes, including tainted ones
        - operator: "Exists"
      containers:
        - name: discovery
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              FACTS_FILE="/host-etc/hardware-facts.json"
              NODE_NAME="${NODE_NAME}"
              LABEL_PREFIX="platform.openplatform.io"
              INTERVAL=21600  # 6 hours

              label_node() {
                if [ ! -f "$FACTS_FILE" ]; then
                  echo "WARNING: $FACTS_FILE not found — hardware-classification NixOS module may not be enabled"
                  echo "Skipping hardware label application"
                  return 0
                fi

                echo "Reading hardware facts from $FACTS_FILE..."
                cat "$FACTS_FILE"

                # Parse facts
                ECC=$(jq -r '.ecc' "$FACTS_FILE")
                STORAGE_CLASS=$(jq -r '.storage_class' "$FACTS_FILE")
                HAS_NVME=$(jq -r '.nvme.present' "$FACTS_FILE")
                HAS_NVIDIA=$(jq -r '.gpu.nvidia' "$FACTS_FILE")
                HAS_AMD_GPU=$(jq -r '.gpu.amd' "$FACTS_FILE")
                CPU_CORES=$(jq -r '.cpu.cores' "$FACTS_FILE")
                RAM_GIB=$(jq -r '.ram_gib' "$FACTS_FILE")

                # Build label patch
                LABELS="\"${LABEL_PREFIX}/memory.ecc\": \"${ECC}\""
                LABELS="${LABELS}, \"${LABEL_PREFIX}/storage.class\": \"${STORAGE_CLASS}\""
                LABELS="${LABELS}, \"${LABEL_PREFIX}/storage.nvme\": \"${HAS_NVME}\""
                LABELS="${LABELS}, \"${LABEL_PREFIX}/gpu.nvidia\": \"${HAS_NVIDIA}\""
                LABELS="${LABELS}, \"${LABEL_PREFIX}/gpu.amd\": \"${HAS_AMD_GPU}\""
                LABELS="${LABELS}, \"${LABEL_PREFIX}/cpu.cores\": \"${CPU_CORES}\""
                LABELS="${LABELS}, \"${LABEL_PREFIX}/ram.gib\": \"${RAM_GIB}\""

                # Compute a workload-class label for easy scheduling:
                #   database  — ECC + sufficient RAM (>= 32 GiB)
                #   gpu       — Has NVIDIA or AMD GPU
                #   compute   — High core count (>= 16) without GPU
                #   general   — Everything else (web apps, lightweight workloads)
                WORKLOAD_CLASS="general"
                if [ "$HAS_NVIDIA" = "true" ] || [ "$HAS_AMD_GPU" = "true" ]; then
                  WORKLOAD_CLASS="gpu"
                elif [ "$ECC" = "true" ] && [ "$RAM_GIB" -ge 32 ] 2>/dev/null; then
                  WORKLOAD_CLASS="database"
                elif [ "$CPU_CORES" -ge 16 ] 2>/dev/null; then
                  WORKLOAD_CLASS="compute"
                fi
                LABELS="${LABELS}, \"${LABEL_PREFIX}/workload-class\": \"${WORKLOAD_CLASS}\""

                echo "Applying labels to node ${NODE_NAME}: workload-class=${WORKLOAD_CLASS}"

                # Apply labels
                kubectl label node "$NODE_NAME" \
                  "${LABEL_PREFIX}/memory.ecc=${ECC}" \
                  "${LABEL_PREFIX}/storage.class=${STORAGE_CLASS}" \
                  "${LABEL_PREFIX}/storage.nvme=${HAS_NVME}" \
                  "${LABEL_PREFIX}/gpu.nvidia=${HAS_NVIDIA}" \
                  "${LABEL_PREFIX}/gpu.amd=${HAS_AMD_GPU}" \
                  "${LABEL_PREFIX}/cpu.cores=${CPU_CORES}" \
                  "${LABEL_PREFIX}/ram.gib=${RAM_GIB}" \
                  "${LABEL_PREFIX}/workload-class=${WORKLOAD_CLASS}" \
                  --overwrite

                # Apply taints based on hardware class
                # GPU nodes: NoSchedule — only GPU-aware workloads should land here
                if [ "$HAS_NVIDIA" = "true" ] || [ "$HAS_AMD_GPU" = "true" ]; then
                  echo "Applying GPU taint (NoSchedule)"
                  kubectl taint node "$NODE_NAME" \
                    "gpu=true:NoSchedule" \
                    --overwrite 2>/dev/null || true
                fi

                # ECC nodes: PreferNoSchedule — prefer to save ECC for data workloads,
                # but don't block scheduling if no other nodes available
                if [ "$ECC" = "true" ]; then
                  echo "Applying ECC taint (PreferNoSchedule)"
                  kubectl taint node "$NODE_NAME" \
                    "memory.ecc=true:PreferNoSchedule" \
                    --overwrite 2>/dev/null || true
                fi

                echo "Hardware discovery complete for ${NODE_NAME}"
              }

              # Initial run
              label_node

              # Re-check periodically
              while true; do
                sleep $INTERVAL
                echo "Periodic re-check..."
                label_node
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-etc
              mountPath: /host-etc
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
            type: Directory
