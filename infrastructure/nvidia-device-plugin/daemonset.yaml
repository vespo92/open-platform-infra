# NVIDIA Device Plugin — advertises nvidia.com/gpu
#
# DaemonSet that runs on any node labeled gpu.nvidia=true. It discovers
# GPUs via the NVIDIA driver and registers them with the kubelet device
# plugin manager, so pods can request `nvidia.com/gpu: <count>` as a
# resource.
#
# This assumes:
#   1. The NixOS gpu-nvidia.nix module is installed on the node
#      (proprietary driver + nvidia-container-toolkit + CDI specs)
#   2. k3s containerd has CDI enabled (k3s >= 1.27 does this automatically
#      when it detects nvidia-container-runtime on the host)
#
# Upstream: https://github.com/NVIDIA/k8s-device-plugin
#
# Version policy: pin to a specific tag and bump via PR.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
    app.kubernetes.io/component: device-plugin
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin
        app.kubernetes.io/name: nvidia-device-plugin
    spec:
      # Only schedule on nodes that actually have an NVIDIA GPU.
      # The label is applied by the hardware-discovery DaemonSet after it
      # parses /etc/hardware-facts.json on each node.
      nodeSelector:
        platform.openplatform.io/gpu.nvidia: "true"

      # Tolerate the GPU taint applied at k3s registration and any
      # upstream nvidia.com/gpu taint variants.
      tolerations:
        - key: gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: CriticalAddonsOnly
          operator: Exists

      priorityClassName: system-node-critical
      hostNetwork: false

      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.0
          imagePullPolicy: IfNotPresent
          env:
            - name: FAIL_ON_INIT_ERROR
              value: "false"
            # Pass through NVIDIA_VISIBLE_DEVICES so the plugin itself
            # can enumerate all GPUs on the host.
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            # Device ID strategy — "uuid" is most robust across reboots,
            # "index" is simpler. UUID is preferred for stable pinning.
            - name: DEVICE_ID_STRATEGY
              value: "uuid"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            # CDI specs generated by nvidia-container-toolkit on the host
            - name: cdi
              mountPath: /var/run/cdi
              readOnly: true

      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
