apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Generated by `npx pepr build` — contains the full admission controller stack:
  #   Namespace, RBAC, TLS secrets, Deployment (admission + watcher),
  #   Services, MutatingWebhookConfig, ValidatingWebhookConfig
  #
  # To regenerate: cd infrastructure/pepr && npx pepr build
  # Then copy: cp dist/pepr-module-open-platform-policy.yaml deploy/pepr-module.yaml
  - pepr-module.yaml

patches:
  # Override default resource limits for our environment
  - target:
      kind: Deployment
      name: pepr-open-platform-policy
      namespace: pepr-system
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
  - target:
      kind: Deployment
      name: pepr-open-platform-policy-watcher
      namespace: pepr-system
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
