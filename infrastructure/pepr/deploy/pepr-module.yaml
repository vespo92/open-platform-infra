    pepr.dev/description: Pepr policy engine for open-platform-infra
  labels:
    app: pepr-open-platform-policy
    pepr.dev/controller: admission
    pepr.dev/uuid: open-platform-policy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pepr-open-platform-policy
      pepr.dev/controller: admission
  template:
    metadata:
      annotations:
        buildTimestamp: '1776097613612'
      labels:
        app: pepr-open-platform-policy
        pepr.dev/controller: admission
    spec:
      terminationGracePeriodSeconds: 5
      priorityClassName: system-node-critical
      serviceAccountName: pepr-open-platform-policy
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        fsGroup: 65532
      containers:
        - name: server
          image: ghcr.io/defenseunicorns/pepr/controller:v0.38.3
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/node_modules/pepr/dist/controller.js
            - 31acaf69c36f9136626abfb5c82cbc505c976ec42710c5e699b8823c127ed470
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
              scheme: HTTPS
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
              scheme: HTTPS
            initialDelaySeconds: 10
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 512Mi
              cpu: 500m
          env:
            - name: PEPR_WATCH_MODE
              value: 'false'
            - name: PEPR_PRETTY_LOG
              value: 'false'
            - name: LOG_LEVEL
              value: info
            - name: PEPR_MODE
              value: audit
          securityContext:
            runAsUser: 65532
            runAsGroup: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/certs
              readOnly: true
            - name: api-token
              mountPath: /app/api-token
              readOnly: true
            - name: module
              mountPath: /app/load
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: pepr-open-platform-policy-tls
        - name: api-token
          secret:
            secretName: pepr-open-platform-policy-api-token
        - name: module
          secret:
            secretName: pepr-open-platform-policy-module
