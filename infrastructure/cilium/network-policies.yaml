# Baseline Cilium Network Policies
#
# These policies enforce namespace isolation for vCluster tenants
# while allowing required infrastructure traffic (DNS, monitoring, etc.)

# ── Default deny all ingress in tenant namespaces ───────────────
# Applied via label selector — any namespace with
# "platform.openplatform.io/tenant: true" gets isolated by default.
# Workloads must explicitly allow traffic via their own policies.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-default-deny-ingress
spec:
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": ""
  ingressDeny: []
  description: >
    Default deny ingress for tenant namespaces.
    Tenants must create explicit CiliumNetworkPolicy to allow traffic.

---
# ── Allow DNS resolution from all pods ──────────────────────────
# Without this, pods can't resolve service names.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP

---
# ── Allow monitoring scrape from Prometheus ─────────────────────
# Prometheus in the monitoring namespace can scrape metrics from all pods.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-prometheus-scrape
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
            - port: "9100"
              protocol: TCP
            - port: "8080"
              protocol: TCP

---
# ── Allow Hubble relay to collect flows ─────────────────────────
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-hubble-relay
spec:
  endpointSelector:
    matchLabels:
      "k8s:io.kubernetes.pod.namespace": kube-system
      k8s-app: cilium
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            app.kubernetes.io/name: hubble-relay
      toPorts:
        - ports:
            - port: "4244"
              protocol: TCP

---
# ── Allow kubelet health checks ─────────────────────────────────
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-health-checks
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
