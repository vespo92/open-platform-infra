apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Cilium MUST be applied first — k3s starts with --flannel-backend=none
  # and --disable-kube-proxy, so nodes will be NotReady until the CNI is
  # installed and Service routing is in place.
  - cilium/helmrelease.yaml
  - traefik/helmrelease.yaml
  - metallb/helmrelease.yaml
  - metallb/config.yaml
  - cert-manager/helmrelease.yaml
  - cert-manager/cluster-issuer.yaml
  - cnpg/helmrelease.yaml
  - flux/gitops-source.yaml
  - vcluster/helmrelease.yaml
  - coredns/deployment.yaml
  - hardware-discovery/daemonset.yaml
  - vault/helmrelease.yaml
  - vault/cluster-secret-store.yaml
  - external-secrets/helmrelease.yaml
  - monitoring/helmrelease.yaml
  - monitoring/loki-helmrelease.yaml
  - monitoring/alloy-helmrelease.yaml
