apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 24h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    api:
      dashboard: true
      insecure: true
    logs:
      access:
        enabled: true
    # LoadBalancer mode (MetalLB assigns VIP)
    deployment:
      kind: Deployment
      replicas: 2
    ports:
      web:
        port: 80
      websecure:
        port: 443
    providers:
      kubernetesCRD:
        allowExternalNameServices: true
        allowEmptyServices: true
      kubernetesIngress:
        allowExternalNameServices: true
        allowEmptyServices: true
    service:
      type: LoadBalancer
      annotations:
        metallb.universe.tf/address-pool: shared-infra
      # spec.loadBalancerIP set via kustomize patch or values override
