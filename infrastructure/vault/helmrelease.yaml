apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: hashicorp
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.releases.hashicorp.com
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: vault
      version: "0.28.x"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      enabled: true
      tlsDisable: false
    server:
      enabled: true
      replicas: 1
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 1Gi
          cpu: 1000m
      dataStorage:
        enabled: true
        size: 10Gi
      auditStorage:
        enabled: false
      standalone:
        enabled: true
        config: |
          ui = true
          listener "tcp" {
            tls_disable = 0
            address = "[::]:8200"
            cluster_address = "[::]:8201"
            tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
            tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
            tls_min_version = "tls12"
          }
          storage "file" {
            path = "/vault/data"
          }
          disable_mlock = true
          telemetry {
            disable_hostname = true
            prometheus_retention_time = "12h"
          }
      extraVolumes:
        - type: secret
          name: vault-tls
      readinessProbe:
        path: /v1/sys/health?standbyok=true&sealedok=true&uninitok=true
      livenessProbe:
        path: /v1/sys/health?standbyok=true&sealedok=true&uninitok=true
    ui:
      enabled: true
    injector:
      enabled: false
